name: CI / Run Tests

on:
  # Runs whenever you open or update a Pull Request targeting the main branch
  pull_request:
    branches: [ "main" ]
  # Runs whenever code is pushed directly to the main branch
  push:
    branches: [ "main" ]

jobs:
  test:
    name: Build and Test
    # Crucial: Must be macOS so the iOS/Native tests can actually compile and run
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run All Tests
        # 'check' is the standard Gradle lifecycle task that compiles code,
        # runs Lint checks, and executes all unit tests across all targets
        run: ./gradlew check --no-configuration-cache

      - name: Generate Summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "### ✅ All tests passed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Tests failed. Please check the logs." >> $GITHUB_STEP_SUMMARY
          fi