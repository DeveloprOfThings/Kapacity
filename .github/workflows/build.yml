name: Build and Test

# Run this workflow every time you push to main, or open a pull request targeting main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # macOS is required to build and test iOS targets in a KMP project
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu' # Zulu is a solid default for Kotlin/Android/KMP

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # This caches your gradle dependencies so future builds are much faster
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build and Run Tests
        # 'check' runs all unit tests and linting. 'build' does that plus assembles the artifacts.
        run: ./gradlew build